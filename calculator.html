<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One-Liner Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    .calc {
      width: min(420px, 92vw);
      background: #1e293b;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    p {
      font-size: 0.875rem;
      color: #94a3b8;
      margin-bottom: 1.5rem;
    }
    form { display: flex; gap: 0.5rem; }
    input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0f172a;
      color: #f8fafc;
      font-size: 1.125rem;
      outline: none;
    }
    input:focus { border-color: #38bdf8; }
    button {
      padding: 0.75rem 1.25rem;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: #0f172a;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #7dd3fc; }
    .result {
      margin-top: 1.25rem;
      padding: 1rem;
      border-radius: 8px;
      background: #0f172a;
      font-size: 1.5rem;
      font-weight: 600;
      min-height: 3.5rem;
      display: flex;
      align-items: center;
    }
    .result.error { color: #f87171; font-size: 0.95rem; font-weight: 500; }
    .hint {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #64748b;
    }
    kbd {
      background: #334155;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="calc">
    <h1>One-Liner Calculator</h1>
    <p>Type an expression and press Enter or =</p>
    <form id="form">
      <input id="expr" type="text" placeholder="e.g. 12 + 7 or 5^2" autofocus autocomplete="off">
      <button type="submit">=</button>
    </form>
    <div id="result" class="result">—</div>
    <div class="hint">Supports <kbd>+</kbd> <kbd>-</kbd> <kbd>*</kbd> <kbd>/</kbd> <kbd>^</kbd> (square/exponent) and parentheses</div>
  </div>

  <script>
    const form = document.getElementById('form');
    const exprInput = document.getElementById('expr');
    const resultEl = document.getElementById('result');

    function evaluate(expression) {
      const trimmed = expression.trim();
      if (!trimmed) throw new Error('Enter an expression');

      if (!/^[\d\s+\-*/().^]+$/.test(trimmed)) {
        throw new Error('Only numbers and + - * / ^ ( ) are allowed');
      }

      const tokens = trimmed.match(/\d+\.?\d*|[+\-*/()^]/g);
      if (!tokens) throw new Error('Invalid expression');

      let i = 0;

      function peek() { return tokens[i]; }
      function consume() { return tokens[i++]; }

      function parseNumber() {
        const t = consume();
        if (t === '(') {
          const val = parseAddSub();
          if (consume() !== ')') throw new Error('Missing closing parenthesis');
          return val;
        }
        const n = parseFloat(t);
        if (Number.isNaN(n)) throw new Error('Invalid number');
        return n;
      }

      function parsePower() {
        let left = parseNumber();
        if (peek() === '^') {
          consume();
          const right = parsePower();
          left = Math.pow(left, right);
        }
        return left;
      }

      function parseMulDiv() {
        let left = parsePower();
        while (peek() === '*' || peek() === '/') {
          const op = consume();
          const right = parsePower();
          if (op === '/' && right === 0) throw new Error('Division by zero');
          left = op === '*' ? left * right : left / right;
        }
        return left;
      }

      function parseAddSub() {
        let left = parseMulDiv();
        while (peek() === '+' || peek() === '-') {
          const op = consume();
          const right = parseMulDiv();
          left = op === '+' ? left + right : left - right;
        }
        return left;
      }

      const value = parseAddSub();
      if (i < tokens.length) throw new Error('Unexpected characters');
      return value;
    }

    function showResult(value, isError = false) {
      resultEl.textContent = isError ? value : String(value);
      resultEl.classList.toggle('error', isError);
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      try {
        showResult(evaluate(exprInput.value));
      } catch (err) {
        showResult(err.message, true);
      }
    });
  </script>
</body>
</html>
